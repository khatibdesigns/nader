<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="robots" content="noindex,nofollow">
<title>Snap OAuth — authorization code</title>
<style>
  :root{color-scheme:dark}
  body{margin:0;min-height:100vh;display:flex;align-items:center;justify-content:center;
    background:#0a1a1c;color:#f2fbfa;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;padding:24px}
  .card{max-width:560px;width:100%;background:#10262a;border:1px solid #1f3d40;border-radius:18px;padding:32px}
  h1{margin:0 0 6px;font-size:20px;color:#3fe0d0}
  p{color:#8fb0ad;font-size:14px;line-height:1.5}
  .code{margin:18px 0;background:#0b2023;border:1px solid #1f3d40;border-radius:12px;padding:16px;
    font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-size:14px;word-break:break-all;color:#f2fbfa}
  button{background:#3fe0d0;color:#052;border:0;border-radius:10px;padding:11px 20px;font-weight:700;font-size:14px;cursor:pointer}
  .err{color:#ffb454}
  .muted{color:#8fb0ad;font-size:12px;margin-top:14px}
</style>
</head>
<body>
<div class="card">
  <h1>🔐 Snap authorization</h1>
  <div id="out"><p>Reading the authorization code…</p></div>
  <div class="muted">This page is a one-time OAuth callback. Nothing is stored or sent anywhere — the code lives only in your browser URL.</div>
</div>
<script>
  const q = new URLSearchParams(location.search);
  const code = q.get("code"), err = q.get("error"), out = document.getElementById("out");
  if (err) {
    out.innerHTML = '<p class="err">Snap returned an error: <b>' + err + '</b>' +
      (q.get("error_description") ? ' — ' + q.get("error_description") : '') + '</p><p>Please retry the authorization link.</p>';
  } else if (code) {
    out.innerHTML =
      '<p>✅ Authorized. Copy this code and paste it back to Claude:</p>' +
      '<div class="code" id="code">' + code + '</div>' +
      '<button onclick="navigator.clipboard.writeText(document.getElementById(\'code\').textContent).then(()=>this.textContent=\'Copied ✓\')">Copy code</button>';
  } else {
    out.innerHTML = '<p class="err">No code found in the URL.</p><p>Open this page by completing the Snap authorization link, not directly.</p>';
  }
</script>
</body>
</html>
