<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sandlines — Connecting…</title>
<style>
  body{margin:0;background:#0e1424;color:#e8edf6;font:16px/1.6 -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;display:flex;min-height:100vh;align-items:center;justify-content:center}
  .card{max-width:520px;margin:22px;padding:32px;background:#141d33;border:1px solid #243049;border-radius:16px;text-align:center}
  h1{color:#f0b53f;font-size:22px;margin:0 0 10px} .ok{color:#9fe6b4} .err{color:#ff8a8a}
  a{color:#f0b53f}
</style>
</head>
<body>
<div class="card">
  <h1>🦅 Connecting to TikTok…</h1>
  <div id="out"><p>Finishing authorization…</p></div>
</div>
<script>
  var WORKER = "https://sandlines-tiktok.eng-nader.workers.dev";
  var q = new URLSearchParams(location.search);
  var code = q.get("code"), state = q.get("state"), err = q.get("error"), errd = q.get("error_description");
  var out = document.getElementById("out");

  if (err) {
    out.innerHTML = '<p class="err">Authorization failed: <b>' + err + '</b></p><p>' + (errd||"") + '</p><p><a href="studio.html">Back to Studio</a></p>';
  } else if (!code) {
    out.innerHTML = '<p>No authorization code present. <a href="studio.html">Back to Studio</a></p>';
  } else if (state && localStorage.getItem("sl_state") && state !== localStorage.getItem("sl_state")) {
    out.innerHTML = '<p class="err">State mismatch — please try connecting again.</p><p><a href="studio.html">Back to Studio</a></p>';
  } else {
    fetch(WORKER + "/exchange", {method:"POST", headers:{"content-type":"application/json"}, body: JSON.stringify({code:code})})
      .then(function(r){return r.json();})
      .then(function(d){
        if (d.connected) { out.innerHTML = '<p class="ok">Connected ✅ Redirecting…</p>'; setTimeout(function(){location.href="studio.html?connected=1";}, 800); }
        else { out.innerHTML = '<p class="err">Could not connect:</p><pre style="text-align:left;white-space:pre-wrap;color:#ff8a8a">' + JSON.stringify(d,null,2) + '</pre><p><a href="studio.html">Back</a></p>'; }
      })
      .catch(function(e){ out.innerHTML = '<p class="err">Network error: ' + e + '</p>'; });
  }
</script>
</body></html>
