<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Sandlines — Authorization</title>
<style>
  body{margin:0;background:#0e1424;color:#e8edf6;font:16px/1.7 -apple-system,Segoe UI,Roboto,Helvetica,Arial,sans-serif;display:flex;min-height:100vh;align-items:center;justify-content:center}
  .card{max-width:560px;margin:22px;padding:32px;background:#141d33;border:1px solid #243049;border-radius:16px}
  h1{color:#f0b53f;font-size:22px;margin:0 0 6px} p{color:#cbd6e8}
  .code{user-select:all;word-break:break-all;background:#0b1120;border:1px solid #243049;border-radius:10px;padding:14px;margin:14px 0;font-family:ui-monospace,Menlo,monospace;font-size:13px;color:#9fe6b4}
  button{background:#f0b53f;color:#0e1424;border:0;border-radius:10px;padding:10px 18px;font-weight:700;cursor:pointer}
  .ok{color:#9fe6b4} .err{color:#ff8a8a}
</style>
</head>
<body>
<div class="card">
  <h1>🦅 Sandlines authorization</h1>
  <div id="out"><p>Reading authorization response…</p></div>
</div>
<script>
  var q = new URLSearchParams(location.search);
  var code = q.get("code"), state = q.get("state"), err = q.get("error"), errd = q.get("error_description"), scopes = q.get("scopes");
  var out = document.getElementById("out");
  if (err) {
    out.innerHTML = '<p class="err">Authorization failed: <b>' + err + '</b></p><p>' + (errd||"") + '</p>';
  } else if (code) {
    out.innerHTML =
      '<p class="ok">Authorized ✅ — copy this code and send it back to finish setup. It expires in a few minutes.</p>' +
      '<div class="code" id="c">' + code + '</div>' +
      '<button onclick="navigator.clipboard.writeText(document.getElementById(\'c\').innerText)">Copy code</button>' +
      (state ? '<p style="font-size:12px;color:#9fb0c8">state: ' + state + '</p>' : '') +
      (scopes ? '<p style="font-size:12px;color:#9fb0c8">scopes: ' + scopes + '</p>' : '');
  } else {
    out.innerHTML = '<p>This page receives the TikTok authorization response for the Sandlines publishing tool. Nothing to do here directly.</p>';
  }
</script>
</body></html>
