name: Daily SEO & Traffic Report

on:
  schedule:
    - cron: '0 5 * * *'      # 05:00 UTC = 08:00 Kuwait (AST, UTC+3), every day
  workflow_dispatch: {}        # allows manual "Run workflow" from the Actions tab

permissions:
  contents: read

concurrency:
  group: daily-report
  cancel-in-progress: false

jobs:
  report:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout (recent history for the "shipped in 24h" section)
        uses: actions/checkout@v4
        with:
          fetch-depth: 60

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install --quiet google-analytics-data google-api-python-client fpdf2

      - name: Write GA4 key from secret
        run: printf '%s' "$GA4_KEY" > "$RUNNER_TEMP/ga4-key.json"
        env:
          GA4_KEY: ${{ secrets.GA4_KEY }}

      - name: Run executive report (GA4 + Search Console + PDF + email)
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ runner.temp }}/ga4-key.json
          GA4_PROPERTY: '540327946'
          GSC_SITE: 'sc-domain:khatibdesigns.com'
          REPORT_EMAIL: 'nader@khatibdesigns.com'
          PDF_OUT: ${{ runner.temp }}/khatib-report.pdf
          SMTP_USER: ${{ secrets.SMTP_USER }}
          SMTP_PASS: ${{ secrets.SMTP_PASS }}
          SMTP_HOST: ${{ secrets.SMTP_HOST }}
          SMTP_PORT: ${{ secrets.SMTP_PORT }}
        run: python3 scripts/daily_report.py
